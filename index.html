<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Election Process Education Assistant</title>
    <meta name="description" content="Learn about the election process in India through this interactive guided assistant. Fast, accessible, and offline-ready.">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Social / SEO -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fleet-bus-494014-q1.web.app/">
    <meta property="og:title" content="Matdan Sathi - Election Assistant">
    <meta property="og:description" content="Interactive guide to the Indian election process. Fast, accessible, and offline-ready.">
    <meta property="og:image" content="https://fleet-bus-494014-q1.web.app/og-image.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://fleet-bus-494014-q1.web.app/">
    <meta property="twitter:title" content="Matdan Sathi - Election Assistant">
    <meta property="twitter:description" content="Interactive guide to the Indian election process. Fast, accessible, and offline-ready.">
    <meta property="twitter:image" content="https://fleet-bus-494014-q1.web.app/og-image.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-performance-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-remote-config-compat.js"></script>

    <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="brand">
                <div class="logo-box">
                    <i data-lucide="vote"></i>
                </div>
                <div class="brand-text">
                    <h1>Matdan Sathi</h1>
                    <span class="status-badge live">
                        <span class="pulse"></span> Live Guide
                    </span>
                </div>
            </div>
            <div class="header-actions">
                <div class="lang-selector">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="hi">HI</button>
                    <button class="lang-btn" data-lang="bn">BN</button>
                </div>
                <button class="icon-btn search-btn" aria-label="Search">
                    <i data-lucide="search"></i>
                </button>
                <button class="icon-btn profile-btn" aria-label="Profile">
                    <i data-lucide="user"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="fade-in">
            <!-- Tabs will be rendered here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="glass-nav">
            <button class="nav-item active" data-tab="journey" aria-selected="true">
                <i data-lucide="map"></i>
                <span>Journey</span>
            </button>
            <button class="nav-item" data-tab="assistant" aria-selected="false">
                <i data-lucide="message-square"></i>
                <span>Assistant</span>
            </button>
            <button class="nav-item" data-tab="vote" aria-selected="false">
                <i data-lucide="box"></i>
                <span>Vote</span>
            </button>
            <button class="nav-item" data-tab="readiness" aria-selected="false">
                <i data-lucide="check-circle"></i>
                <span>Readiness</span>
            </button>
            <button class="nav-item" data-tab="alerts" aria-selected="false">
                <div class="notification-badge" style="display: none;">0</div>
                <i data-lucide="bell"></i>
                <span>Alerts</span>
            </button>
        </nav>
        <!-- Safe Site Disclaimer -->
        <footer style="margin-top: auto; padding: 20px; text-align: center; border-top: 1px solid var(--border); opacity: 0.7;">
            <p style="font-size: 0.7rem; color: var(--text-muted); line-height: 1.4;">
                <strong>Matdan Sathi</strong> - Official Educational Project for Hackathon.<br>
                Secure & Privacy-Focused. No personal data collected.
            </p>
        </footer>
    </div>

    <!-- Templates -->
    <template id="journey-view-template">
        <section class="view-section">
            <div class="section-header">
                <h2>Election Journey</h2>
                <p>Follow the path of democracy</p>
            </div>
            <div class="timeline-container scroll-snapper">
                <!-- Timeline items will be injected here -->
            </div>
        </section>
    </template>

    <template id="assistant-view-template">
        <section class="view-section full-height">
            <div class="chat-container glass-panel">
                <div class="chat-messages" id="chat-messages" aria-live="polite">
                    <div class="assistant-msg animate-up">
                        <div class="avatar"><i data-lucide="bot"></i></div>
                        <div class="msg-bubble">
                            Namaste! I am your Election Assistant. How can I help you today?
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" placeholder="Ask about voting..." id="chat-input">
                    <button class="send-btn"><i data-lucide="send"></i></button>
                </div>
            </div>
        </section>
    </template>

    <template id="alerts-view-template">
        <section class="view-section">
            <div class="section-header">
                <div class="header-main">
                    <h2>Live Alerts</h2>
                    <p>Critical updates from ECI</p>
                </div>
                <button class="text-btn">Mark all read</button>
            </div>
            <div class="alert-stack">
                <!-- Alerts will be injected here -->
            </div>
        </section>
    </template>

    <template id="vote-view-template">
        <section class="view-section">
            <div class="section-header">
                <h2 id="vote-title">Mock Election</h2>
                <p id="vote-desc">Practice using the EVM & VVPAT</p>
            </div>
            <div class="evm-wrapper animate-up">
                <div class="cu-unit">
                    <div class="cu-header">CONTROL UNIT</div>
                    <div class="cu-body">
                        <div class="cu-display-panel">
                            <div class="cu-status">
                                <div class="status-light busy" id="cu-busy-light"></div>
                                <span>BUSY</span>
                            </div>
                        </div>
                        <button class="ballot-btn" id="ballot-trigger">BALLOT</button>
                    </div>
                </div>

                <div class="bu-unit">
                    <div class="bu-header">
                        <div class="status-light ready" id="bu-ready-light"></div>
                        <span>BALLOTING UNIT</span>
                    </div>
                    <div class="candidates-grid" id="bu-candidates">
                        <!-- Candidates injected here -->
                    </div>
                </div>

                <div class="vvpat-unit">
                    <div class="vvpat-header">VVPAT</div>
                    <div class="vvpat-window">
                        <div class="vvpat-slip" id="vvpat-slip">
                            <div class="slip-content">
                                <div class="slip-symbol-box"></div>
                                <div class="slip-info">
                                    <span class="slip-num"></span>
                                    <span class="slip-name"></span>
                                </div>
                            </div>
                        </div>
                        <div class="window-glass"></div>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="info-modal-template">
        <div class="modal-overlay animate-in">
            <div class="modal-content glass-panel animate-up">
                <div class="modal-header">
                    <h2>Project Status</h2>
                    <button class="close-modal"><i data-lucide="x"></i></button>
                </div>
                <div class="modal-body">
                    <div class="info-group">
                        <label>Live Assistant</label>
                        <a href="https://fleet-bus-494014-q1.web.app" target="_blank">fleet-bus-494014-q1.web.app</a>
                    </div>
                    <div class="info-group">
                        <label>Admin Dashboard</label>
                        <a href="/admin.html" target="_blank">Access Admin Panel</a>
                    </div>
                    <div class="info-group">
                        <label>GitHub Repository</label>
                        <a href="https://github.com/ujju2020/Election-Process-Education" target="_blank">ujju2020/Election-Process-Education</a>
                    </div>
                    <div class="info-group">
                        <label>Languages</label>
                        <p>English, Hindi, Bengali (EN | HI | BN)</p>
                    </div>
                    <div class="info-group">
                        <label>Security</label>
                        <p>Password Protected Admin & XSS Sanitization</p>
                    </div>
                    <div class="info-group">
                        <label>Developer</label>
                        <p>Ujjwal Kumar Bhowmick</p>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="app.v3.js"></script>
</body>
</html>
